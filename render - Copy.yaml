# Render Blueprint for NullMaps — Phase 1 (basemap online).
#
# Render doesn't run docker-compose, so this Blueprint declares the two pieces
# needed to see the map on the web:
#
#   1. nullmaps-tiles : Martin tile server (Docker). Serves /tiles/* — the
#                       basemap, fonts and sprites. Downloads vietnam.pmtiles
#                       from PMTILES_URL on first boot.
#   2. nullmaps-demo  : the static map page, rewired to call the tiles service.
#
# Routing (Valhalla) and search (geocoder) are intentionally NOT here — they're
# heavier/paid and come later. The basemap renders without them.
#
# How to deploy: see infra/render/README.md. In short — Render dashboard →
# New → Blueprint → pick the LogZu2k/nullmaps repo → set the two env vars below.

services:
  # --- 1) Tile server -------------------------------------------------------
  - type: web
    name: nullmaps-tiles
    runtime: docker
    dockerfilePath: ./infra/render/Dockerfile.martin
    dockerContext: .
    plan: free                       # upgrade to 'starter' for no cold-start sleep
    healthCheckPath: /tiles/catalog
    envVars:
      - key: PMTILES_URL             # set in the dashboard: link to your vietnam.pmtiles
        sync: false
    # Optional: persist the downloaded basemap so it isn't re-fetched on every
    # cold start. Disks require a paid instance (starter+). Uncomment to enable:
    # disk:
    #   name: tiles-data
    #   mountPath: /data
    #   sizeGB: 2

  # --- 2) Static map page ---------------------------------------------------
  - type: web
    name: nullmaps-demo
    runtime: static
    rootDir: vercel-demo
    buildCommand: node build.mjs
    staticPublishPath: ./public
    envVars:
      - key: NM_ORIGIN               # paste the tiles service URL after it deploys,
        sync: false                  # e.g. https://nullmaps-tiles.onrender.com
